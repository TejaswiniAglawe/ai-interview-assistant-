<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rehearsal — AI Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12171D;
    --surface:#1B222B;
    --surface-raised:#222A34;
    --paper:#ECE5D6;
    --muted:#8D95A1;
    --hairline:#2E3742;
    --brass:#C99A4A;
    --brass-dim:#8A6B36;
    --green:#75A889;
    --rose:#C1707A;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 20px 80px;
  }
  .app{width:100%;max-width:640px;}
  .eyebrow{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--brass);
    margin:0 0 6px;
  }
  h1{
    font-family:var(--font-display);
    font-weight:500;
    font-size:32px;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .sub{color:var(--muted);font-size:14px;margin:0 0 36px;line-height:1.6;}
  .card{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:28px;
    margin-bottom:20px;
  }
  label.field-label{
    display:block;
    font-size:12px;
    font-family:var(--font-mono);
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin-bottom:8px;
  }
  input[type=text], select, textarea{
    width:100%;
    background:var(--surface-raised);
    border:1px solid var(--hairline);
    color:var(--paper);
    font-family:var(--font-body);
    font-size:15px;
    padding:11px 13px;
    border-radius:8px;
    outline:none;
  }
  input[type=text]:focus, select:focus, textarea:focus{
    border-color:var(--brass-dim);
    box-shadow:0 0 0 3px rgba(201,154,74,0.15);
  }
  textarea{resize:vertical;min-height:120px;line-height:1.6;font-size:15px;}
  .row{display:flex;gap:14px;margin-bottom:18px;}
  .row > div{flex:1;}
  button{
    font-family:var(--font-body);
    font-weight:600;
    font-size:14px;
    border-radius:8px;
    border:1px solid transparent;
    padding:12px 22px;
    cursor:pointer;
    transition:transform 0.08s ease, opacity 0.15s ease;
  }
  button:active{transform:scale(0.98);}
  button.primary{background:var(--brass);color:#241A08;}
  button.primary:hover{opacity:0.92;}
  button.ghost{background:transparent;border-color:var(--hairline);color:var(--paper);}
  button.ghost:hover{background:var(--surface-raised);}
  button.listening{background:var(--rose);color:#2B1114;border-color:var(--rose);}
  button:disabled{opacity:0.5;cursor:not-allowed;}
  .pulse-dot{
    width:12px;height:12px;border-radius:50%;background:var(--rose);
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.45;transform:scale(1.3);}
  }
  .caption-text{
    font-family:var(--font-display);font-size:19px;line-height:1.6;
    color:var(--paper);min-height:80px;margin:0;
  }
  .stage{
    position:relative;
    border-radius:14px;
    padding:40px 32px;
    margin-bottom:20px;
    background:
      radial-gradient(ellipse 340px 220px at 50% 0%, rgba(201,154,74,0.16), transparent 70%),
      var(--surface);
    border:1px solid var(--hairline);
    text-align:center;
  }
  .q-count{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--brass);
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .question{
    font-family:var(--font-display);
    font-size:24px;
    line-height:1.45;
    font-weight:500;
    margin:0;
  }
  .rail{display:flex;gap:6px;justify-content:center;margin-top:22px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--hairline);}
  .dot.done{background:var(--brass);}
  .dot.current{background:var(--paper);}
  .feedback-card{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:26px 28px;
    margin-bottom:20px;
  }
  .fb-top{display:flex;align-items:center;gap:18px;margin-bottom:20px;}
  .score-ring{
    width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:17px;font-weight:500;
    border:2px solid var(--brass);color:var(--brass);
    flex-shrink:0;
  }
  .fb-headline{font-family:var(--font-display);font-size:18px;font-weight:500;margin:0;}
  .fb-section{margin-bottom:16px;}
  .fb-label{
    font-family:var(--font-mono);font-size:11px;text-transform:uppercase;
    letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;
  }
  .fb-label.strength{color:var(--green);}
  .fb-label.improve{color:var(--rose);}
  ul.fb-list{margin:0;padding-left:18px;line-height:1.7;font-size:14.5px;}
  ul.fb-list li{margin-bottom:4px;}
  .tip{
    font-size:14.5px;line-height:1.6;color:var(--paper);
    background:var(--surface-raised);border-radius:8px;padding:14px 16px;
    border-left:2px solid var(--brass);
  }
  .actions{display:flex;gap:10px;margin-top:4px;}
  .loading{
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:30px;color:var(--muted);font-size:14px;font-family:var(--font-mono);
  }
  .spinner{
    width:14px;height:14px;border-radius:50%;
    border:2px solid var(--hairline);border-top-color:var(--brass);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .summary-grid{display:flex;gap:12px;margin-bottom:20px;}
  .stat{
    flex:1;background:var(--surface-raised);border-radius:10px;
    padding:16px;text-align:center;
  }
  .stat .num{font-family:var(--font-display);font-size:26px;color:var(--brass);}
  .stat .label{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;}
  .error-note{color:var(--rose);font-size:13px;margin-top:10px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="app">
  <p class="eyebrow">Rehearsal room</p>
  <h1>Interview practice, with feedback</h1>
  <p class="sub">Pick a role, answer questions one at a time, and get coached feedback on each answer — like running lines before opening night.</p>

  <!-- SETUP SCREEN -->
  <div id="setup" class="card">
    <label class="field-label">Role you're interviewing for</label>
    <input type="text" id="roleInput" placeholder="e.g. Product Manager, Data Analyst, Nurse" style="margin-bottom:18px;">
    <div class="row">
      <div>
        <label class="field-label">Experience level</label>
        <select id="levelInput">
          <option value="entry-level">Entry-level</option>
          <option value="mid-level" selected>Mid-level</option>
          <option value="senior">Senior</option>
        </select>
      </div>
      <div>
        <label class="field-label">Focus</label>
        <select id="focusInput">
          <option value="behavioral">Behavioral</option>
          <option value="mixed">Mixed (behavioral + technical)</option>
          <option value="technical">Technical / role-specific</option>
        </select>
      </div>
    </div>
    <label class="field-label">Time per question</label>
    <select id="timeLimitInput" style="margin-bottom:18px;">
      <option value="0">No limit</option>
      <option value="60">1 minute</option>
      <option value="90" selected>90 seconds</option>
      <option value="120">2 minutes</option>
      <option value="180">3 minutes</option>
    </select>
    <label style="display:flex;align-items:center;gap:9px;margin-bottom:20px;font-size:14px;cursor:pointer;">
      <input type="checkbox" id="voiceModeInput" style="width:16px;height:16px;">
      Voice mode — Claude reads questions aloud, you answer by speaking
    </label>
    <button class="primary" id="startBtn">Start practice</button>
    <div id="setupError" class="error-note hidden"></div>
  </div>

  <!-- SESSION SCREEN -->
  <div id="session" class="hidden">
    <div class="stage">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="q-count" id="qCount">Question 1</div>
        <div class="q-count" id="timerDisplay" style="color:var(--muted);"></div>
      </div>
      <p class="question" id="questionText"></p>
      <div class="rail" id="rail"></div>
    </div>

    <div class="card" id="answerCard">
      <div id="typingBlock">
        <label class="field-label">Your answer</label>
        <textarea id="answerInput" placeholder="Type your answer as you would say it out loud..."></textarea>
        <div class="actions" style="margin-top:14px;">
          <button class="primary" id="submitBtn">Get feedback</button>
        </div>
      </div>
      <div id="voiceBlock" class="hidden">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <div class="pulse-dot" id="pulseDot"></div>
          <span class="field-label" id="listenStatus" style="margin:0;">Listening</span>
        </div>
        <p class="caption-text" id="liveCaption">Start speaking whenever you're ready...</p>
        <div class="actions" style="margin-top:18px;">
          <button class="primary" id="doneBtn">I'm done answering</button>
        </div>
      </div>
      <div class="actions" style="margin-top:14px;">
        <button class="ghost" id="skipBtn">Skip question</button>
      </div>
      <div id="voiceNote" class="error-note hidden"></div>
    </div>

    <div id="loadingBox" class="feedback-card hidden">
      <div class="loading"><div class="spinner"></div><span id="loadingLabel">Thinking it over...</span></div>
    </div>

    <div id="feedbackBox" class="hidden"></div>
  </div>

  <!-- SUMMARY SCREEN -->
  <div id="summary" class="hidden">
    <div class="stage">
      <p class="q-count">Session complete</p>
      <p class="question" id="summaryHeadline" style="font-size:22px;"></p>
    </div>
    <div class="summary-grid" id="summaryStats"></div>
    <button class="ghost" id="restartBtn">Practice again</button>
  </div>
</div>

<script>
const TOTAL_QUESTIONS = 5;
let state = {
  role: '', level: '', focus: '', timeLimit: 0, voiceEnabled: false,
  questions: [], currentIndex: 0,
  scores: [], history: []
};
let timerInterval = null;
let timeRemaining = 0;
let recognition = null;
let isListening = false;
let submitOnStop = false;
let silenceTimer = null;
const SILENCE_MS = 2200;

const SpeechRecognitionClass = window.SpeechRecognition || window.webkitSpeechRecognition;
const speechSupported = !!SpeechRecognitionClass;

function speak(text, onend) {
  if (!state.voiceEnabled || !window.speechSynthesis) { if (onend) onend(); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.98;
  utter.pitch = 1;
  if (onend) utter.onend = onend;
  window.speechSynthesis.speak(utter);
}

function setupRecognition() {
  if (!speechSupported) return null;
  const rec = new SpeechRecognitionClass();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-US';
  let finalTranscript = '';
  let baseText = '';

  rec.onstart = () => {
    baseText = document.getElementById('answerInput').value.trim();
    finalTranscript = '';
    isListening = true;
    submitOnStop = false;
    document.getElementById('pulseDot').style.background = 'var(--rose)';
    document.getElementById('listenStatus').textContent = 'Listening';
    document.getElementById('liveCaption').textContent = "Start speaking whenever you're ready...";
    document.getElementById('voiceNote').classList.add('hidden');
  };

  rec.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += transcript + ' ';
      } else {
        interim += transcript;
      }
    }
    const combined = [baseText, finalTranscript, interim].filter(Boolean).join(' ').trim();
    document.getElementById('answerInput').value = combined;
    document.getElementById('liveCaption').textContent = combined || "Start speaking whenever you're ready...";

    if (silenceTimer) clearTimeout(silenceTimer);
    if (combined) {
      document.getElementById('listenStatus').textContent = 'Listening — will wrap up shortly after you stop';
      silenceTimer = setTimeout(() => {
        if (isListening) {
          submitOnStop = true;
          recognition.stop();
        }
      }, SILENCE_MS);
    }
  };

  rec.onerror = (event) => {
    submitOnStop = false;
    if (silenceTimer) clearTimeout(silenceTimer);
    const note = document.getElementById('voiceNote');
    note.textContent = 'Microphone error: ' + event.error + '. Click "I\'m done answering" to retry, or skip the question.';
    note.classList.remove('hidden');
  };

  rec.onend = () => {
    isListening = false;
    if (silenceTimer) clearTimeout(silenceTimer);
    if (submitOnStop) {
      submitOnStop = false;
      const answer = document.getElementById('answerInput').value.trim();
      if (answer) {
        submitAnswer();
      } else {
        const note = document.getElementById('voiceNote');
        note.textContent = "Didn't catch anything — go ahead and try again.";
        note.classList.remove('hidden');
        autoStartListening();
      }
    }
  };

  return rec;
}

function autoStartListening() {
  if (!speechSupported) return;
  if (!recognition) recognition = setupRecognition();
  try { recognition.start(); } catch (e) { /* already started */ }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function startTimer() {
  stopTimer();
  const display = document.getElementById('timerDisplay');
  if (!state.timeLimit) {
    display.textContent = '';
    return;
  }
  timeRemaining = state.timeLimit;
  display.style.color = 'var(--muted)';
  display.textContent = formatTime(timeRemaining);
  timerInterval = setInterval(() => {
    timeRemaining -= 1;
    display.textContent = formatTime(Math.max(timeRemaining, 0));
    if (timeRemaining <= 10 && timeRemaining > 0) {
      display.style.color = 'var(--rose)';
    }
    if (timeRemaining <= 0) {
      stopTimer();
      handleTimeUp();
    }
  }, 1000);
}

function handleTimeUp() {
  if (recognition && isListening) { submitOnStop = false; recognition.stop(); }
  if (silenceTimer) clearTimeout(silenceTimer);
  const answer = document.getElementById('answerInput').value.trim();
  if (answer) {
    submitAnswer();
  } else {
    advance();
  }
}

async function callClaude(systemPrompt, userPrompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }]
    })
  });
  const data = await response.json();
  const textBlock = (data.content || []).find(c => c.type === "text");
  if (!textBlock) throw new Error("No response text");
  return textBlock.text;
}

function extractJson(text) {
  const cleaned = text.replace(/```json|```/g, "").trim();
  const start = cleaned.indexOf('{');
  const arrStart = cleaned.indexOf('[');
  let s = start;
  if (arrStart !== -1 && (start === -1 || arrStart < start)) s = arrStart;
  const end = Math.max(cleaned.lastIndexOf('}'), cleaned.lastIndexOf(']'));
  return JSON.parse(cleaned.slice(s, end + 1));
}

const FALLBACK_QUESTIONS = [
  "Tell me about yourself and what draws you to this role.",
  "Describe a time you faced a difficult challenge at work. How did you handle it?",
  "What's a mistake you made professionally, and what did you learn from it?",
  "Why do you want to work here, and what can you bring to the team?",
  "Tell me about a time you disagreed with a coworker or manager. What happened?"
];

async function generateQuestions(role, level, focus) {
  const sys = "You are an interview question generator. Respond with ONLY a JSON array of strings, nothing else, no markdown fences, no preamble.";
  const prompt = `Generate ${TOTAL_QUESTIONS} realistic interview questions for a ${level} ${role} position, with a focus on ${focus} questions. Return them as a JSON array of ${TOTAL_QUESTIONS} plain strings, ordered from warm-up to more probing.`;
  try {
    const text = await callClaude(sys, prompt);
    const arr = extractJson(text);
    if (Array.isArray(arr) && arr.length > 0) return arr.slice(0, TOTAL_QUESTIONS);
    throw new Error("bad shape");
  } catch (e) {
    return FALLBACK_QUESTIONS;
  }
}

async function gradeAnswer(role, level, question, answer) {
  const sys = "You are an experienced, encouraging but honest interview coach. Respond with ONLY valid JSON, no markdown fences, no preamble. Schema: {\"score\": number (1-10), \"headline\": short string (max 8 words), \"strengths\": [string, string], \"improvements\": [string, string], \"tip\": string (one concrete, specific tip, max 2 sentences)}.";
  const prompt = `Role: ${level} ${role}\nQuestion asked: "${question}"\nCandidate's answer: "${answer}"\n\nEvaluate this answer as if for a real interview. Be specific to what they actually said. Keep each strength/improvement to one short sentence.`;
  const text = await callClaude(sys, prompt);
  return extractJson(text);
}

function renderRail() {
  const rail = document.getElementById('rail');
  rail.innerHTML = '';
  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.currentIndex ? ' done' : i === state.currentIndex ? ' current' : '');
    rail.appendChild(d);
  }
}

function showQuestion() {
  document.getElementById('feedbackBox').classList.add('hidden');
  document.getElementById('feedbackBox').innerHTML = '';
  document.getElementById('answerCard').classList.remove('hidden');
  document.getElementById('answerInput').value = '';
  document.getElementById('typingBlock').classList.toggle('hidden', state.voiceEnabled);
  document.getElementById('voiceBlock').classList.toggle('hidden', !state.voiceEnabled);
  if (state.voiceEnabled) {
    document.getElementById('liveCaption').textContent = "Start speaking whenever you're ready...";
  }
  document.getElementById('qCount').textContent = `Question ${state.currentIndex + 1} of ${TOTAL_QUESTIONS}`;
  document.getElementById('questionText').textContent = state.questions[state.currentIndex];
  document.getElementById('voiceNote').classList.add('hidden');
  renderRail();
  startTimer();
  speak(state.questions[state.currentIndex], () => {
    if (state.voiceEnabled) autoStartListening();
  });
}

function renderFeedback(fb) {
  const box = document.getElementById('feedbackBox');
  const scoreColor = fb.score >= 8 ? 'var(--green)' : fb.score >= 5 ? 'var(--brass)' : 'var(--rose)';
  box.innerHTML = `
    <div class="feedback-card">
      <div class="fb-top">
        <div class="score-ring" style="border-color:${scoreColor};color:${scoreColor};">${fb.score}</div>
        <p class="fb-headline">${fb.headline}</p>
      </div>
      <div class="fb-section">
        <div class="fb-label strength">What worked</div>
        <ul class="fb-list">${fb.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <div class="fb-section">
        <div class="fb-label improve">What to sharpen</div>
        <ul class="fb-list">${fb.improvements.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <div class="tip">${fb.tip}</div>
      <div class="actions" style="margin-top:18px;">
        <button class="primary" id="nextBtn">${state.currentIndex + 1 < TOTAL_QUESTIONS ? 'Next question' : 'See summary'}</button>
      </div>
    </div>`;
  box.classList.remove('hidden');
  document.getElementById('nextBtn').addEventListener('click', advance);
}

function advance() {
  state.currentIndex += 1;
  document.getElementById('answerCard').classList.remove('hidden');
  if (state.currentIndex >= TOTAL_QUESTIONS) {
    showSummary();
  } else {
    showQuestion();
  }
}

function showSummary() {
  stopTimer();
  document.getElementById('session').classList.add('hidden');
  document.getElementById('summary').classList.remove('hidden');
  const avg = state.scores.length ? (state.scores.reduce((a,b)=>a+b,0) / state.scores.length) : 0;
  const headline = avg >= 8 ? "Strong session — you're interview-ready." :
                    avg >= 6 ? "Solid session, a few things to tighten up." :
                    avg > 0 ? "Good start — worth another round of practice." :
                    "Session ended early.";
  document.getElementById('summaryHeadline').textContent = headline;
  const grid = document.getElementById('summaryStats');
  grid.innerHTML = `
    <div class="stat"><div class="num">${state.scores.length}</div><div class="label">Answered</div></div>
    <div class="stat"><div class="num">${avg ? avg.toFixed(1) : '—'}</div><div class="label">Avg score</div></div>
    <div class="stat"><div class="num">${state.scores.filter(s=>s>=8).length}</div><div class="label">Strong answers</div></div>
  `;
}

document.getElementById('startBtn').addEventListener('click', async () => {
  const role = document.getElementById('roleInput').value.trim();
  const errBox = document.getElementById('setupError');
  if (!role) {
    errBox.textContent = 'Enter a role to practice for.';
    errBox.classList.remove('hidden');
    return;
  }
  errBox.classList.add('hidden');
  state.role = role;
  state.level = document.getElementById('levelInput').value;
  state.focus = document.getElementById('focusInput').value;
  state.timeLimit = parseInt(document.getElementById('timeLimitInput').value, 10);
  state.voiceEnabled = document.getElementById('voiceModeInput').checked;
  if (state.voiceEnabled) recognition = setupRecognition();

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Preparing questions...';

  state.questions = await generateQuestions(state.role, state.level, state.focus);
  state.currentIndex = 0;
  state.scores = [];

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('session').classList.remove('hidden');
  showQuestion();

  btn.disabled = false;
  btn.textContent = 'Start practice';
});

async function submitAnswer() {
  const answer = document.getElementById('answerInput').value.trim();
  if (!answer) return;
  stopTimer();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('answerCard').classList.add('hidden');
  document.getElementById('loadingBox').classList.remove('hidden');
  try {
    const fb = await gradeAnswer(state.role, state.level, state.questions[state.currentIndex], answer);
    state.scores.push(fb.score);
    document.getElementById('loadingBox').classList.add('hidden');
    renderFeedback(fb);
  } catch (e) {
    document.getElementById('loadingBox').classList.add('hidden');
    document.getElementById('answerCard').classList.remove('hidden');
    const err = document.createElement('div');
    err.className = 'error-note';
    err.textContent = "Couldn't get feedback just now — try submitting again.";
    document.getElementById('answerCard').appendChild(err);
  }
}

document.getElementById('doneBtn').addEventListener('click', () => {
  if (!speechSupported) {
    const note = document.getElementById('voiceNote');
    note.textContent = "This browser doesn't support voice input in this browser — try Chrome, or switch off voice mode to type instead.";
    note.classList.remove('hidden');
    return;
  }
  if (isListening) {
    submitOnStop = true;
    recognition.stop();
  } else {
    autoStartListening();
  }
});

document.getElementById('submitBtn').addEventListener('click', submitAnswer);

document.getElementById('skipBtn').addEventListener('click', () => {
  if (recognition && isListening) { submitOnStop = false; recognition.stop(); }
  if (silenceTimer) clearTimeout(silenceTimer);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopTimer();
  advance();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('summary').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
  document.getElementById('roleInput').value = '';
});
</script>
</body>
</html>
